services:
  postgres:
    image: postgres:17-alpine
    container_name: tg_vpn_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tg_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tg_bot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: tg_vpn_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    expose:
      - "3000"

  caddy:
    image: caddy:2.8-alpine
    container_name: tg_vpn_caddy
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
